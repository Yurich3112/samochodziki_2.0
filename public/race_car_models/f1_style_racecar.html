<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racecar SVG - Top View</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2a2a2a;
        }
        svg {
            max-width: 100%;
            height: 90vh;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800">
        <!-- Front Wing -->
        <path d="M100,50 h200 v40 q0,5 -5,5 h-190 q-5,0 -5,-5 z" fill="#333" />
        <rect x="110" y="60" width="180" height="15" rx="3" fill="#1a1a1a" />
        <rect x="100" y="50" width="10" height="40" fill="#e60000" />
        <rect x="290" y="50" width="10" height="40" fill="#e60000" />

        <!-- Front Suspension -->
        <line x1="100" y1="140" x2="160" y2="160" stroke="#444" stroke-width="6" stroke-linecap="round"/>
        <line x1="300" y1="140" x2="240" y2="160" stroke="#444" stroke-width="6" stroke-linecap="round"/>
        <line x1="100" y1="180" x2="160" y2="170" stroke="#444" stroke-width="6" stroke-linecap="round"/>
        <line x1="300" y1="180" x2="240" y2="170" stroke="#444" stroke-width="6" stroke-linecap="round"/>

        <!-- Front Wheels -->
        <rect x="65" y="110" width="35" height="90" rx="8" fill="#111" />
        <rect x="300" y="110" width="35" height="90" rx="8" fill="#111" />
        <rect x="75" y="110" width="15" height="90" fill="#222" />
        <rect x="310" y="110" width="15" height="90" fill="#222" />

        <!-- Carbon Fiber Floor -->
        <path d="M130,240 L270,240 L290,620 L110,620 Z" fill="#1a1a1a" />

        <!-- Sidepods -->
        <path d="M150,290 L115,340 L115,570 L150,620 Z" fill="#cc0000" />
        <path d="M250,290 L285,340 L285,570 L250,620 Z" fill="#cc0000" />
        
        <!-- Sidepod Intakes -->
        <path d="M150,290 L120,340 L150,340 Z" fill="#000" />
        <path d="M250,290 L280,340 L250,340 Z" fill="#000" />

        <!-- Main Body / Nose -->
        <path d="M180,50 L220,50 L230,260 L250,320 L250,640 L150,640 L150,320 L170,260 Z" fill="#ff1a1a" />
        <path d="M190,55 L210,55 L215,260 L185,260 Z" fill="#e60000" />
        <polygon points="195,65 205,65 210,120 190,120" fill="#ffcc00" /> <!-- Nose accent -->

        <!-- Halo (Safety Structure) -->
        <path d="M175,390 C175,330 225,330 225,390 L230,420 C230,310 170,310 170,420 Z" fill="#111" />
        <line x1="200" y1="340" x2="200" y2="360" stroke="#111" stroke-width="8" />

        <!-- Cockpit & Driver -->
        <path d="M175,340 L225,340 L225,430 L175,430 Z" fill="#0a0a0a" />
        <circle cx="200" cy="380" r="18" fill="#ffcc00" /> <!-- Helmet -->
        <path d="M186,375 Q200,365 214,375 L212,385 Q200,392 188,385 Z" fill="#111" /> <!-- Visor -->

        <!-- Engine Cover / Airbox -->
        <path d="M190,440 L210,440 L215,640 L185,640 Z" fill="#b30000" />
        <ellipse cx="200" cy="445" rx="10" ry="15" fill="#000" /> <!-- Air intake -->
        <rect x="198" y="460" width="4" height="160" fill="#333" /> <!-- Spine -->

        <!-- Rear Suspension -->
        <line x1="100" y1="540" x2="160" y2="560" stroke="#444" stroke-width="8" stroke-linecap="round"/>
        <line x1="300" y1="540" x2="240" y2="560" stroke="#444" stroke-width="8" stroke-linecap="round"/>
        <line x1="100" y1="600" x2="160" y2="580" stroke="#444" stroke-width="8" stroke-linecap="round"/>
        <line x1="300" y1="600" x2="240" y2="580" stroke="#444" stroke-width="8" stroke-linecap="round"/>

        <!-- Rear Wheels -->
        <rect x="55" y="510" width="45" height="110" rx="8" fill="#111" />
        <rect x="300" y="510" width="45" height="110" rx="8" fill="#111" />
        <rect x="70" y="510" width="15" height="110" fill="#222" />
        <rect x="315" y="510" width="15" height="110" fill="#222" />

        <!-- Rear Wing Sub-structure -->
        <rect x="180" y="640" width="10" height="40" fill="#222" />
        <rect x="210" y="640" width="10" height="40" fill="#222" />

        <!-- Rear Wing -->
        <rect x="110" y="670" width="180" height="45" rx="5" fill="#333" />
        <rect x="110" y="670" width="15" height="60" rx="2" fill="#e60000" /> <!-- Left Endplate -->
        <rect x="275" y="670" width="15" height="60" rx="2" fill="#e60000" /> <!-- Right Endplate -->
        <rect x="125" y="680" width="150" height="25" fill="#1a1a1a" />
        
        <!-- DRS Actuator / Detail -->
        <rect x="190" y="690" width="20" height="15" fill="#111" />
    </svg>
</body>
</html>
