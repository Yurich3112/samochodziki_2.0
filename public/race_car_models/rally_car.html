<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally Car SVG - Top View</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2a2a2a;
        }
        svg {
            max-width: 100%;
            height: 90vh;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800">
        <!-- Tires (All-Terrain/Gravel) -->
        <rect x="45" y="160" width="45" height="95" rx="5" fill="#111" />
        <rect x="310" y="160" width="45" height="95" rx="5" fill="#111" />
        <rect x="45" y="520" width="45" height="95" rx="5" fill="#111" />
        <rect x="310" y="520" width="45" height="95" rx="5" fill="#111" />

        <!-- Mudflaps -->
        <rect x="40" y="245" width="55" height="15" fill="#dc2626" />
        <rect x="305" y="245" width="55" height="15" fill="#dc2626" />
        <rect x="40" y="605" width="55" height="20" fill="#dc2626" />
        <rect x="305" y="605" width="55" height="20" fill="#dc2626" />

        <!-- Underbody / Diffuser -->
        <path d="M 80,100 L 320,100 L 320,680 L 80,680 Z" fill="#111" />
        <path d="M 100,670 L 300,670 L 310,720 L 90,720 Z" fill="#1a1a1a" />
        <!-- Exhaust -->
        <circle cx="280" cy="700" r="14" fill="#222" stroke="#d1d5db" stroke-width="3" />

        <!-- Main Widebody Contour -->
        <path d="
            M 120,95
            L 280,95
            C 320,95 340,130 340,210
            L 305,280
            L 305,480
            L 340,560
            C 340,640 320,670 280,670
            L 120,670
            C 80,670 60,640 60,560
            L 95,480
            L 95,280
            L 60,210
            C 60,130 80,95 120,95 Z" fill="#ffffff" />

        <!-- Base Livery Graphics -->
        <polygon points="120,250 280,250 240,165 160,165" fill="#dc2626" />
        <polygon points="140,250 260,250 230,175 170,175" fill="#111" />
        <path d="M 60,210 L 95,280 L 95,480 L 60,560 L 60,500 L 80,450 L 80,300 L 60,250 Z" fill="#dc2626" />
        <path d="M 340,210 L 305,280 L 305,480 L 340,560 L 340,500 L 320,450 L 320,300 L 340,250 Z" fill="#dc2626" />
        <path d="M 60,250 L 80,300 L 80,450 L 60,500 Z" fill="#1f2937" />
        <path d="M 340,250 L 320,300 L 320,450 L 340,500 Z" fill="#1f2937" />

        <!-- Front Grille & Splitter -->
        <path d="M 140,95 L 260,95 L 270,115 L 130,115 Z" fill="#111" />
        <path d="M 100,90 L 300,90 L 310,100 L 90,100 Z" fill="#111" />

        <!-- Hood Vents -->
        <rect x="120" y="150" width="35" height="25" rx="3" fill="#1a1a1a" />
        <rect x="245" y="150" width="35" height="25" rx="3" fill="#1a1a1a" />

        <!-- Side Mirrors -->
        <path d="M 95,290 L 65,290 L 65,310 L 95,300 Z" fill="#111" />
        <path d="M 305,290 L 335,290 L 335,310 L 305,300 Z" fill="#111" />

        <!-- Windshield & Sun Strip -->
        <path d="M 110,260 L 290,260 C 270,330 260,340 250,340 L 150,340 C 140,340 130,330 110,260 Z" fill="#111827" />
        <polygon points="115,260 285,260 280,285 120,285" fill="#1a1a1a" />
        <path d="M 120,285 L 280,285 L 245,330 L 155,330 Z" fill="#1f2937" opacity="0.6"/> <!-- Glare -->

        <!-- Side Windows -->
        <path d="M 100,280 L 140,350 L 145,510 L 110,480 Z" fill="#111827" />
        <path d="M 300,280 L 260,350 L 255,510 L 290,480 Z" fill="#111827" />

        <!-- Roof & Scoop -->
        <path d="M 150,340 L 250,340 L 245,520 L 155,520 Z" fill="#ffffff" />
        <path d="M 175,350 L 225,350 L 215,400 L 185,400 Z" fill="#e5e7eb" />
        <path d="M 180,355 L 220,355 L 215,365 L 185,365 Z" fill="#111" />

        <!-- Rear Window (Hatch) & Internal Roll Cage -->
        <path d="M 155,520 L 245,520 L 265,600 L 135,600 Z" fill="#111827" />
        <line x1="165" y1="535" x2="235" y2="585" stroke="#fef08a" stroke-width="4" />
        <line x1="235" y1="535" x2="165" y2="585" stroke="#fef08a" stroke-width="4" />

        <!-- Taillights -->
        <path d="M 80,640 L 130,630 L 130,655 L 80,655 Z" fill="#dc2626" />
        <path d="M 320,640 L 270,630 L 270,655 L 320,655 Z" fill="#dc2626" />

        <!-- Rear Wing System -->
        <!-- Mounts -->
        <rect x="140" y="580" width="10" height="90" fill="#111" />
        <rect x="250" y="580" width="10" height="90" fill="#111" />
        <!-- Lower Plane -->
        <rect x="90" y="620" width="220" height="20" rx="3" fill="#374151" />
        <!-- Upper Main Plane -->
        <rect x="50" y="665" width="300" height="30" rx="5" fill="#111827" />
        <!-- Endplates -->
        <rect x="45" y="610" width="15" height="85" rx="3" fill="#dc2626" />
        <rect x="340" y="610" width="15" height="85" rx="3" fill="#dc2626" />
    </svg>
</body>
</html>
