<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Le Mans Hypercar SVG</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222;
        }
        svg {
            max-width: 100%;
            height: 90vh;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
        }
    </style>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800">
        <!-- Carbon Floor & Rear Diffuser -->
        <path d="M 60,80 L 340,80 L 340,750 L 280,750 L 280,770 L 120,770 L 120,750 L 60,750 Z" fill="#0f0f0f" />
        
        <!-- Diffuser Strakes -->
        <rect x="130" y="750" width="4" height="25" fill="#333" />
        <rect x="160" y="750" width="4" height="25" fill="#333" />
        <rect x="198" y="750" width="4" height="25" fill="#333" />
        <rect x="236" y="750" width="4" height="25" fill="#333" />
        <rect x="266" y="750" width="4" height="25" fill="#333" />

        <!-- Front Splitter & Dive Planes -->
        <path d="M 70,50 L 330,50 L 340,90 L 60,90 Z" fill="#1a1a1a" />
        <path d="M 60,70 L 120,70 L 110,50 L 70,50 Z" fill="#e60000" />
        <path d="M 340,70 L 280,70 L 290,50 L 330,50 Z" fill="#e60000" />
        <!-- Dive Planes -->
        <path d="M 50,110 L 80,130 L 80,140 L 45,115 Z" fill="#111" />
        <path d="M 350,110 L 320,130 L 320,140 L 355,115 Z" fill="#111" />

        <!-- Tires (Partially visible under bodywork) -->
        <rect x="50" y="120" width="40" height="90" rx="4" fill="#050505" />
        <rect x="310" y="120" width="40" height="90" rx="4" fill="#050505" />
        <rect x="50" y="550" width="40" height="100" rx="4" fill="#050505" />
        <rect x="310" y="550" width="40" height="100" rx="4" fill="#050505" />

        <!-- Deep Aero Channels (Under Bodywork) -->
        <path d="M 120,150 L 280,150 L 280,500 L 120,500 Z" fill="#0a0a0a" />
        
        <!-- Main Body Base (White) -->
        <path d="
            M 140,40
            L 260,40
            C 290,40 330,90 330,160
            L 330,230
            C 330,250 280,270 280,360
            L 280,480
            C 280,520 340,540 340,620
            L 330,730
            L 270,730
            L 260,710
            L 140,710
            L 130,730
            L 70,730
            L 60,620
            C 60,540 120,520 120,480
            L 120,360
            C 120,270 70,250 70,230
            L 70,160
            C 70,90 110,40 140,40 Z" fill="#f4f4f5" />

        <!-- Livery / Red Accents -->
        <path d="M 140,40 L 260,40 L 280,180 L 200,240 L 120,180 Z" fill="#e60000" />
        <path d="M 280,360 L 330,280 L 330,230 L 280,260 Z" fill="#e60000" />
        <path d="M 120,360 L 70,280 L 70,230 L 120,260 Z" fill="#e60000" />
        <path d="M 140,710 L 200,640 L 260,710 Z" fill="#111" />
        <path d="M 60,620 L 120,550 L 120,710 L 70,730 Z" fill="#e60000" />
        <path d="M 340,620 L 280,550 L 280,710 L 330,730 Z" fill="#e60000" />

        <!-- Front Aero Bridges / Flow Conditioners -->
        <path d="M 120,90 L 150,90 L 140,160 L 100,160 Z" fill="#111" />
        <path d="M 280,90 L 250,90 L 260,160 L 300,160 Z" fill="#111" />
        <!-- Nose Opening -->
        <path d="M 160,50 L 240,50 L 220,110 L 180,110 Z" fill="#050505" />

        <!-- Detailed Headlight Clusters -->
        <path d="M 75,70 L 115,60 L 125,140 L 85,140 Z" fill="#0a0a0a" />
        <path d="M 325,70 L 285,60 L 275,140 L 315,140 Z" fill="#0a0a0a" />
        <!-- LED Elements -->
        <rect x="90" y="80" width="20" height="4" fill="#fef08a" transform="rotate(15 100 82)" />
        <rect x="88" y="95" width="20" height="4" fill="#fef08a" transform="rotate(15 98 97)" />
        <rect x="86" y="110" width="20" height="4" fill="#fef08a" transform="rotate(15 96 112)" />
        <rect x="290" y="80" width="20" height="4" fill="#fef08a" transform="rotate(-15 300 82)" />
        <rect x="292" y="95" width="20" height="4" fill="#fef08a" transform="rotate(-15 302 97)" />
        <rect x="294" y="110" width="20" height="4" fill="#fef08a" transform="rotate(-15 304 112)" />

        <!-- Front Fender Louvers (Detailed Carbon) -->
        <g stroke="#0a0a0a" stroke-width="4" stroke-linecap="round">
            <line x1="85" y1="170" x2="120" y2="160" />
            <line x1="85" y1="185" x2="120" y2="175" />
            <line x1="85" y1="200" x2="120" y2="190" />
            <line x1="85" y1="215" x2="120" y2="205" />
            <line x1="85" y1="230" x2="120" y2="220" />
            
            <line x1="315" y1="170" x2="280" y2="160" />
            <line x1="315" y1="185" x2="280" y2="175" />
            <line x1="315" y1="200" x2="280" y2="190" />
            <line x1="315" y1="215" x2="280" y2="205" />
            <line x1="315" y1="230" x2="280" y2="220" />
        </g>

        <!-- Suspension Wishbones (Visible through aero gaps) -->
        <line x1="120" y1="130" x2="160" y2="140" stroke="#444" stroke-width="3" />
        <line x1="120" y1="150" x2="160" y2="140" stroke="#444" stroke-width="3" />
        <line x1="280" y1="130" x2="240" y2="140" stroke="#444" stroke-width="3" />
        <line x1="280" y1="150" x2="240" y2="140" stroke="#444" stroke-width="3" />

        <!-- Sidepod Intakes & Bargeboards -->
        <path d="M 120,360 L 160,360 L 170,420 L 120,400 Z" fill="#050505" />
        <path d="M 280,360 L 240,360 L 230,420 L 280,400 Z" fill="#050505" />
        <!-- Carbon Bargeboard elements -->
        <path d="M 110,340 L 140,340 L 140,420 L 120,400 Z" fill="#1a1a1a" />
        <path d="M 290,340 L 260,340 L 260,420 L 280,400 Z" fill="#1a1a1a" />

        <!-- Cockpit Canopy (Hypercar Teardrop) -->
        <path d="M 200,240 C 260,240 270,330 250,440 C 235,520 210,560 200,560 C 190,560 165,520 150,440 C 130,330 140,240 200,240 Z" fill="#0a0a0a" />
        <!-- Glass Gradient/Reflection -->
        <path d="M 200,250 C 235,250 245,300 240,350 L 160,350 C 155,300 165,250 200,250 Z" fill="#1a202c" />
        <path d="M 162,350 L 238,350 L 230,410 L 170,410 Z" fill="#111827" />
        <path d="M 175,260 L 205,330 L 180,340 Z" fill="#374151" opacity="0.4" />
        <!-- Windshield Wiper (Central) -->
        <line x1="200" y1="360" x2="200" y2="280" stroke="#333" stroke-width="3" stroke-linecap="round" />
        <line x1="200" y1="280" x2="215" y2="255" stroke="#333" stroke-width="2" stroke-linecap="round" />

        <!-- Roof Scoop / Engine Intake -->
        <path d="M 185,410 L 215,410 L 210,480 L 190,480 Z" fill="#1a1a1a" />
        <path d="M 190,415 L 210,415 L 205,440 L 195,440 Z" fill="#000" />
        
        <!-- Roof Antennas & Pitot Tubes -->
        <rect x="195" y="380" width="2" height="15" fill="#f4f4f5" />
        <circle cx="196" cy="380" r="2" fill="#ef4444" />
        <rect x="203" y="385" width="2" height="10" fill="#f4f4f5" />

        <!-- Detailed Shark Fin -->
        <rect x="197" y="480" width="6" height="230" fill="#111" />
        <rect x="198" y="480" width="2" height="230" fill="#e60000" />
        <!-- Fin Carbon Details -->
        <path d="M 197,550 L 203,550 L 203,600 L 197,580 Z" fill="#222" />

        <!-- Engine Cover Louvers/Vents -->
        <path d="M 150,520 L 170,500 L 170,560 L 150,550 Z" fill="#0a0a0a" />
        <path d="M 250,520 L 230,500 L 230,560 L 250,550 Z" fill="#0a0a0a" />
        <line x1="152" y1="530" x2="168" y2="515" stroke="#222" stroke-width="2" />
        <line x1="152" y1="540" x2="168" y2="525" stroke="#222" stroke-width="2" />
        <line x1="248" y1="530" x2="232" y2="515" stroke="#222" stroke-width="2" />
        <line x1="248" y1="540" x2="232" y2="525" stroke="#222" stroke-width="2" />

        <!-- Rear Suspension / Gearbox Detail (Exposed) -->
        <path d="M 140,680 L 260,680 L 250,730 L 150,730 Z" fill="#111" />
        <line x1="140" y1="690" x2="190" y2="710" stroke="#444" stroke-width="4" />
        <line x1="260" y1="690" x2="210" y2="710" stroke="#444" stroke-width="4" />
        <circle cx="200" cy="710" r="10" fill="#222" stroke="#555" stroke-width="2" />

        <!-- Exhaust -->
        <circle cx="170" cy="670" r="9" fill="#050505" stroke="#a1a1aa" stroke-width="2" />
        <circle cx="230" cy="670" r="9" fill="#050505" stroke="#a1a1aa" stroke-width="2" />
        
        <!-- Panel Lines (Adding realism/scale) -->
        <g stroke="#cbd5e1" stroke-width="1.5" fill="none" opacity="0.6">
            <path d="M 120,260 L 160,260 L 170,300" />
            <path d="M 280,260 L 240,260 L 230,300" />
            <path d="M 120,480 L 160,460 L 180,480" />
            <path d="M 280,480 L 240,460 L 220,480" />
            <!-- Nose cone separation -->
            <path d="M 140,160 L 260,160" />
        </g>

        <!-- Massive Multi-Element Rear Wing -->
        <!-- Swan Neck Mounts -->
        <path d="M 165,650 L 175,650 L 175,730 L 160,730 Z" fill="#1a1a1a" />
        <path d="M 235,650 L 225,650 L 225,730 L 240,730 Z" fill="#1a1a1a" />
        <!-- Lower Beam Wing -->
        <rect x="100" y="710" width="200" height="15" rx="2" fill="#0a0a0a" />
        <!-- Upper Main Plane -->
        <rect x="50" y="690" width="300" height="30" rx="4" fill="#111" />
        <!-- DRS Flap / Gurney -->
        <rect x="55" y="705" width="290" height="10" fill="#222" />
        <!-- Huge Endplates with louvers -->
        <path d="M 50,650 L 60,650 L 60,740 L 50,730 Z" fill="#e60000" />
        <path d="M 350,650 L 340,650 L 340,740 L 350,730 Z" fill="#e60000" />
        <line x1="52" y1="670" x2="58" y2="670" stroke="#111" stroke-width="2" />
        <line x1="52" y1="680" x2="58" y2="680" stroke="#111" stroke-width="2" />
        <line x1="342" y1="670" x2="348" y2="670" stroke="#111" stroke-width="2" />
        <line x1="342" y1="680" x2="348" y2="680" stroke="#111" stroke-width="2" />

        <!-- Rear Rain Light (FIA spec) -->
        <rect x="196" y="740" width="8" height="8" fill="#ef4444" />
    </svg>
</body>
</html>
